name: patinhas_amor
description: Flutter mobile application for Patinhas e Amor NGO - managing animal rescue occurrences and rescued animals.

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^3.10.1
  cloud_firestore: ^5.6.3

  url_launcher: ^6.3.0
  intl: ^0.19.0

  # HTTP client for API communication
  http: ^1.1.0

  # State management
  provider: ^6.1.1

  # Image picking for animal registration
  image_picker: ^1.0.7

  # Material Design icons
  cupertino_icons: ^1.0.2
  flutter_dotenv: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - .env  
  # Assets can be added here for images used in the app
  # assets:
  #   - assets/images/

  
